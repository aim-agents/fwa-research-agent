name: AgentBeats Submission

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Benchmark target (factory, warehouse, retail, all)'
        required: true
        default: 'factory'
        type: choice
        options:
          - factory
          - warehouse
          - retail
          - all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run classification tests
        run: pytest tests/test_task_processor.py -v
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  submit:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build submission artifact
        run: |
          echo "Building AgentBeats submission for target: ${{ github.event.inputs.target }}"
          echo "Image: ghcr.io/${{ github.repository }}:latest"
          echo "Ready for submission to agentbeats.dev"
